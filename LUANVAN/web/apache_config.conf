# Apache Configuration cho TTS Web Application
# Hướng dẫn cấu hình Apache của XAMPP để chạy Flask app

# Copy nội dung này vào file httpd-vhosts.conf của XAMPP
# Thường nằm tại: C:\xampp\apache\conf\extra\httpd-vhosts.conf

# Cần cài đặt mod_proxy và mod_proxy_http trong httpd.conf:
# LoadModule proxy_module modules/mod_proxy.so
# LoadModule proxy_http_module modules/mod_proxy_http.so

<VirtualHost *:80>
    ServerName localhost
    ServerAlias www.localhost
    
    # Proxy tất cả requests đến Flask app (chạy trên port 5000)
    ProxyPreserveHost On
    ProxyPass / http://127.0.0.1:5000/
    ProxyPassReverse / http://127.0.0.1:5000/
    
    # Static files - có thể serve trực tiếp từ Apache
    Alias /static "D:/LUANVAN/web/static"
    <Directory "D:/LUANVAN/web/static">
        Options -Indexes
        AllowOverride None
        Require all granted
    </Directory>
    
    ErrorLog "logs/tts_error.log"
    CustomLog "logs/tts_access.log" common
</VirtualHost>

# Hướng dẫn:
# 1. Chạy Flask app: python run.py (chạy trên port 5000)
# 2. Restart Apache trong XAMPP Control Panel
# 3. Truy cập: http://localhost
